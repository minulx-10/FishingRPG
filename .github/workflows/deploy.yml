name: Deploy Discord Bot

on:
  push:
    branches:
      - main 
    paths-ignore:
      - '**.json' # 🌟 JSON 파일만 수정될 때는 배포(재시작) 생략!

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: GSM SV 서버에 접속해서 배포 대본 실행하기
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 24111
          script: |
            cd /home/ubuntu/discord_bot
            if ! command -v cloudflared &> /dev/null; then
                wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
                chmod +x cloudflared
                sudo mv cloudflared /usr/local/bin/
            fi
            
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            if [[ "$COMMIT_MSG" == *"[hotfix]"* ]]; then
                echo "🔥 Hot Reload Mode: Pulling changes without restarting the bot!"
                git pull origin main
            else
                echo "🔄 Full Deploy Mode: Restarting the bot!"
                
                echo "📋 === deploy.sh 내용 확인 ==="
                cat deploy.sh
                echo "📋 === ======================== ==="
                
                echo "📋 === .env 파일 존재 확인 ==="
                ls -la .env 2>/dev/null || echo "⚠️ .env 파일이 없습니다!"
                
                echo "📋 === 기존 Python 프로세스 확인 ==="
                ps aux | grep -E "python|fishing" | grep -v grep || echo "없음"
                
                sed -i 's/fishing_rpg.py/fishing_main.py/g' deploy.sh
                chmod +x deploy.sh
                ./deploy.sh
                
                echo "📋 === 배포 직후 프로세스 ==="
                ps aux | grep -E "python|fishing" | grep -v grep || echo "없음"
                
                sleep 10
                
                echo "📋 === 10초 후 프로세스 생존 확인 ==="
                ps aux | grep -E "fishing_main" | grep -v grep || echo "⚠️ fishing_main.py 프로세스가 죽었습니다!"
                
                echo "📋 === 로그 파일 탐색 ==="
                ls -la *.log *.out 2>/dev/null || echo "로그 파일 없음"
                find . -name "*.log" -o -name "*.out" -o -name "nohup*" 2>/dev/null | head -10
                
                echo "📋 === 직접 실행 테스트 (5초 타임아웃) ==="
                timeout 5 python3 fishing_main.py 2>&1 || echo "프로세스 종료 (코드: $?)"
            fi

name: Deploy Discord Bot

on:
  push:
    branches:
      - main
    paths-ignore:
      - '**.json'
  workflow_dispatch: # 🌟 수동 배포 가능하게 추가!

jobs:
  lint:
    runs-on: ubuntu-latest
    permissions:
      contents: write # 🌟 (중요) 봇이 수정된 코드를 다시 Push할 수 있도록 쓰기 권한 부여

    steps:
      - uses: actions/checkout@v3
        with:
          # Auto-commit을 위해 전체 히스토리를 가져옵니다.
          fetch-depth: 0 

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy -r requirements.txt

      - name: Run Ruff Auto-fix
        # 🌟 1. 일단 고칠 수 있는 건 다 고칩니다. (에러가 있어도 다음 단계로 넘어가게 || true 추가)
        run: ruff check . --fix || true

      - name: Auto-commit Ruff fixes
        # 🌟 2. 수정된 파일이 있으면 깃허브 액션 봇이 알아서 커밋하고 푸시합니다.
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "style: auto-fix ruff formatting [skip ci]"

      - name: Run Ruff (Strict Check)
        # 🌟 3. 봇이 자동으로 못 고친 진짜 코드 에러가 남아있다면 여기서 빌드를 터트립니다.
        run: ruff check .

      - name: Run Mypy
        run: mypy .

  deploy:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: GSM SV 서버에 접속해서 배포 대본 실행하기
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 24111
          script: |
            cd /home/ubuntu/discord_bot
            if ! command -v cloudflared &> /dev/null; then
                wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
                chmod +x cloudflared
                sudo mv cloudflared /usr/local/bin/
            fi
            
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            if [[ "$COMMIT_MSG" == *"[hotfix]"* ]]; then
                echo "🔥 Hot Reload Mode: Pulling changes without restarting the bot!"
                git checkout logs/fishing_bot.log || true
                git pull origin main
            else
                echo "🔄 Full Deploy Mode: Restarting the bot!"
                git checkout logs/fishing_bot.log || true
                git pull origin main
                
                # 🌟 GitHub Secrets로부터 .env 파일 자동 생성
                echo "DISCORD_TOKEN=${{ secrets.DISCORD_TOKEN }}" > .env
                echo "ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}" >> .env
                echo "WEB_PORT=8888" >> .env
                
                pip3 install -r requirements.txt --quiet 2>&1 || echo "⚠️ pip install 실패"
                sudo apt-get install -y fonts-noto-cjk > /dev/null 2>&1 || true
                sed -i 's/fishing_rpg.py/fishing_main.py/g' deploy.sh
                chmod +x deploy.sh
                ./deploy.sh
            fi

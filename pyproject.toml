[tool.ruff]
# 린트 규칙 설정
select = ["E", "F", "I", "N", "W", "UP", "B", "A", "COM", "C4", "DTZ", "T20", "RET", "SIM", "PTH", "ERA", "PL", "RUF"]
ignore = ["E501"] # 라인 길이 제한은 유연하게 적용

# 파이썬 버전 설정
target-version = "py310"

# 소스 디렉토리 설정
src = ["."]

[tool.ruff.format]
quote-style = "double"
indent-style = "space"
skip-magic-trailing-comma = false
line-ending = "auto"

[tool.mypy]
python_version = "3.10"
warn_return_any = true
warn_unused_configs = true
disallow_untyped_defs = false
check_untyped_defs = true
ignore_missing_imports = true
strict_optional = true

[tool.black]
line-length = 120
target-version = ['py310']

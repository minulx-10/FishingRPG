name: Deploy Discord Bot

on:
  push:
    branches:
      - main 
    paths-ignore:
      - '**.json' # 🌟 JSON 파일만 수정될 때는 배포(재시작) 생략!

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: GSM SV 서버에 접속해서 배포 대본 실행하기
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 24111
          script: |
            cd /home/ubuntu/discord_bot
            if ! command -v cloudflared &> /dev/null; then
                wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
                chmod +x cloudflared
                sudo mv cloudflared /usr/local/bin/
            fi
            
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            if [[ "$COMMIT_MSG" == *"[hotfix]"* ]]; then
                echo "🔥 Hot Reload Mode: Pulling changes without restarting the bot!"
                git pull origin main
            else
                echo "🔄 Full Deploy Mode: Restarting the bot!"
                sed -i 's/fishing_rpg.py/fishing_main.py/g' deploy.sh
                chmod +x deploy.sh
                ./deploy.sh
            fi
            
            echo "📋 === Bot Log (last 50 lines) ==="
            sleep 5
            tail -n 50 nohup.out 2>/dev/null || tail -n 50 bot.log 2>/dev/null || echo "No log file found (nohup.out / bot.log)"
            
            echo "📋 === Running Processes ==="
            ps aux | grep -E "python|fishing" | grep -v grep || echo "No python process found!"

name: Deploy Discord Bot

on:
  push:
    branches:
      - main 
    paths-ignore:
      - '**.json' # 🌟 JSON 파일만 수정될 때는 배포(재시작) 생략!

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install ruff mypy -r requirements.txt
      - name: Run Ruff
        run: ruff check .
      - name: Run Mypy
        run: mypy .

  deploy:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - name: GSM SV 서버에 접속해서 배포 대본 실행하기
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.HOST }}
          username: ${{ secrets.USERNAME }}
          password: ${{ secrets.PASSWORD }}
          port: 24111
          script: |
            cd /home/ubuntu/discord_bot
            if ! command -v cloudflared &> /dev/null; then
                wget -q https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64 -O cloudflared
                chmod +x cloudflared
                sudo mv cloudflared /usr/local/bin/
            fi
            
            COMMIT_MSG="${{ github.event.head_commit.message }}"
            if [[ "$COMMIT_MSG" == *"[hotfix]"* ]]; then
                echo "🔥 Hot Reload Mode: Pulling changes without restarting the bot!"
                git pull origin main
            else
                echo "🔄 Full Deploy Mode: Restarting the bot!"
                pip3 install Pillow pilmoji --quiet 2>&1 || echo "⚠️ pip install 실패"
                sudo apt-get install -y fonts-noto-cjk > /dev/null 2>&1 || true
                sed -i 's/fishing_rpg.py/fishing_main.py/g' deploy.sh
                chmod +x deploy.sh
                ./deploy.sh
            fi

[tool.ruff]
target-version = "py310"
line-length = 120
exclude = [
    "fishing_rpg_old.py",
    "test_battle.py",
    "venv",
    ".venv",
    "__pycache__",
]

[tool.ruff.lint]
select = [
    "E", "F", "I", "N", "W", "UP", "B", "PL", "SIM", "RUF", "DTZ", "T20"
]
ignore = [
    "E501",    # 라인 길이 제한
    "E701",    # 한 줄에 여러 문장
    "W291",    # 트레일링 공백
    "W293",    # 빈 줄 공백
    "PLC2401", # 비ASCII 문자 (한글)
    "N802",    # 함수명 대문자
    "N803",    # 인자명 대문자
    "N999",    # 모듈명 규칙
    "RET503",  # 명시적 return 누락
    "PLR0912", # 분기문 너무 많음
    "PLR0915", # 문장 너무 많음
    "PLR0911", # return 문 너무 많음
    "PLR0913", # 인자 너무 많음
    "PLR2004", # Magic value
    "PLC0415", # 로컬 import
    "RUF006",  # asyncio.create_task 결과 미저장
    "RUF013",  # implicit Optional
    "SIM105",  # try-except-pass
    "SIM117",  # nested with
    "PTH",     # Pathlib 권장
    "COM812",  # Trailing comma missing
    "RUF001",  # Ambiguous unicode character (이모지 허용)
    "ERA001",  # Commented-out code
    "B007",    # Unused loop control variable
    "F841",    # Unused local variable
    "RUF059",  # Unused unpacked variable
    "T201",    # print 사용 허용 (필요한 경우)
    "DTZ005",  # datetime.now() without tz 허용
    "PLW0603", # global statement 허용
]

[tool.ruff.lint.isort]
combine-as-imports = true
known-first-party = ["fishing_core", "fishing_cogs"]

[tool.mypy]
python_version = "3.10"
ignore_missing_imports = true
check_untyped_defs = true
